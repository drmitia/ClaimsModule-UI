<h2 mat-dialog-title>Reject Reserve</h2>
<mat-dialog-content>
  <p>Please provide a reason for rejecting this reserve.</p>
  <form [formGroup]="form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Rejection Reason</mat-label>
      <textarea matInput formControlName="reason"
        rows="3"
        placeholder="Explain why this reserve is being rejected...">
      </textarea>
      @if (form.get('reason')?.hasError('required')) {
        <mat-error>Reason is required</mat-error>
      }
      @if (form.get('reason')?.hasError('minlength')) {
        <mat-error>Minimum 5 characters required</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="warn"
    [disabled]="form.invalid"
    (click)="onConfirm()">
    Reject Reserve
  </button>
</mat-dialog-actions>
